# WHMCS jail — add this block to /etc/fail2ban/jail.local
# Install: append the content below to /etc/fail2ban/jail.local
#          (or drop as /etc/fail2ban/jail.d/whmcs.conf on fail2ban >= 0.11)

[whmcs]
enabled  = true
filter   = whmcs
logpath  = /var/log/whmcs_auth.log
maxretry = 5
findtime = 600
bantime  = 3600
