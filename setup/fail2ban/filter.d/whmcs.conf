# fail2ban filter for WHMCS authentication failures
# Install: cp whmcs.conf /etc/fail2ban/filter.d/whmcs.conf
#
# Compatible log line format (written by hooks.php):
#   2026-04-11 10:00:00 WHMCS login failed from 1.2.3.4 area=client user=foo@bar

[Definition]
failregex = ^.* WHMCS login failed from <HOST>.*$
ignoreregex =
